name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint with ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Type check with mypy
      run: uv run mypy tv_scraper/
      continue-on-error: true  # Don't fail the build on type errors initially

    - name: Run Unit, Mock, and Integration Tests
      run: uv run pytest tests/unit tests/mock tests/integration -v --cov=tv_scraper --cov-report=term-missing

    # Note: Live tests (tests/live/) require TradingView API access and should be run locally by developers
    # to avoid rate limiting on CI. To run live tests locally:
    #   pytest tests/live/ -v
