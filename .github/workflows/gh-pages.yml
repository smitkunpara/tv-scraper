name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/gh-pages.yml'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system mkdocs-material mkdocs-git-revision-date-localized-plugin mike

      - name: Deploy documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch gh-pages branch to ensure mike can see it
          git fetch origin gh-pages --depth=1 || true

          # Resolve version name from branch or tag
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="${{ github.ref_type }}"

          if [[ "$REF_TYPE" == "tag" ]]; then
            VERSION_NAME="$REF_NAME"
          elif [[ "$REF_NAME" == "main" || "$REF_NAME" == "master" ]]; then
            VERSION_NAME="latest"
          else
            VERSION_NAME="$REF_NAME"
          fi

          mike deploy --push --update-aliases "$VERSION_NAME"
          if [[ "$VERSION_NAME" == "latest" ]]; then
            mike set-default --push latest
          fi
